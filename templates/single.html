<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

@page{
    size: 1920px 1080px;
    margin:0;
}

* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
}

/* ================= CENTER PAGE ================= */
.center-page {
    position: relative;
    width: 100%;
    height: 100%;
    page-break-after: always;
}

/* LOGO */
.logo {
    position: absolute;
    bottom: 1cm;
    right: 1cm;
}

.logo img {
    height: 4.5cm;
}

/* ================= FIXED PAGE ================= */
.center-page,
.container {
    width: 1920px;
    height: 1080px;
    position: relative;
    page-break-after: always;
    break-after: page;
    overflow: hidden;

}




.title {
    font-size: 48px;
    font-weight: bold;
    text-align: center;

    
    overflow: hidden;     /* 🔥 cut extra text */
    width: 75%; 
    line-height: 1.2;
}

/* IMAGE BOX (FIXED HEIGHT) */
.image-box {
    width: 70%;        /* 🔥 முன்னாடி 70% → இப்ப 90% */
    height: 700px;     /* 🔥 height increase */
    
    display: flex;
    justify-content: center;
    align-items: center;

    margin-top: 20px;
   
}


.image-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;/* 🔥 full image visible */
    border-radius: 20px;
}

/* ================= RIGHT ================= */
.container {
    display: flex;
    width: 1920px;
    height: 1080px;
    position: relative;
    page-break-after: always;
    overflow: hidden;

    align-items: flex-start; /* 🔥 IMPORTANT */
}
.left-column {
    width: 70%;
    padding: 60px 50px;

    display: flex;
    flex-direction: column;
    align-items: center;   /* 🔥 center align */
    justify-content: flex-start;
    margin-top: 5%;
}
.right-column {
    width: 50%;
    padding: 80px 50px 50px 0;  /* 🔥 same top padding as left */

    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;

    height: 100%;
    margin-top: 5%;
   
}

.price-row {
    font-size: 34px;
    font-weight: bold;

    margin-top: 0;
    margin-left: 2px;

    white-space: nowrap;  /* 🔥 same line */
}

.price,
.mrp {
    display: inline-block;  /* 🔥 side by side */
    padding: 10px 15px;
    border-radius: 10px;
    vertical-align: middle;
}

/* spacing between them */
.price {
    background-color: aqua;
    margin-right: 20px;  /* 🔥 gap */
}

.mrp {
    background-color: blueviolet;
}


.description {
    font-size: 24px;
    font-weight: bold;

    height: 250px;        /* 🔥 fixed space */
    overflow: hidden;     /* 🔥 cut extra text */
    width: 70%; 
    line-height: 1.4;
    margin-top: 30%;
}
/* ================= FOOTER ================= */
.footer {
    position: absolute;
    bottom: 1cm;
    width: 100%;
    text-align: center;
    font-size:20px;
}

</style>

</head>

<body>

<!-- ================= FIRST PAGE ================= -->
<div class="center-page">

    <img src="{{first_page}}" style="
        position:absolute;
        width:100%;
        height:100%;
        object-fit:cover;
        top:0;
        left:0;
        z-index:-1;
    ">

    <div style="
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        height:100%;
      
    ">
        <img src="{{client_logo}}" style="height:230px; margin-top: 25%;margin-left: 12%; ">
    </div>

</div>

<!-- ================= PRODUCTS ================= -->
{% for p in products %}
{% if p.image and p.image != "" %}

<div class="container">

    <div class="logo">
        <img src="{{ud_logo}}">
    </div>

    <img src="{{middle_page}}" style="
        position:absolute;
        width:100%;
        height:100%;
        object-fit:cover;
        top:0;
        left:0;
        z-index:-1;
    ">

    <div class="left-column">
        <div class="title">{{p.name}}</div>

        <div class="image-box">
            <img src="{{p.image}}">
        </div>
    </div>

    <div class="right-column">

    <div class="price-row">
        <div class="price">UD Price: ₹ {{p.price}}</div>
        <div class="mrp">MRP: ₹ {{p.mrp}}</div>
    </div>

    <div class="description">
        Description: <br>
        {{p.description | safe}}
    </div>

</div>

</div>

</div>

<div class="footer">
    Urbane Design Corporate Gifting Simplified | https://urbd.in | {{sales_phone}}
</div>

{% endif %}
{% endfor %}

<!-- ================= TERMS PAGE ================= -->
<div style="position:relative; width:100%; height:100%; page-break-before: always;">

    <img src="{{terms_page}}" style="
        width:100%;
        height:100%;
        object-fit:cover;
    ">

</div>

<!-- ================= LAST PAGE ================= -->
<div class="center-page">

    <img src="{{last_page}}" style="
        position:absolute;
        width:100%;
        height:100%;
        object-fit:cover;
        top:0;
        left:0;
    ">

    <div style="
        position:absolute;
        bottom:20%;
        width:100%;
        text-align:center;
        font-size:35px;
        margin-left:31%;

    ">
        {{sales_phone}}
    </div>

</div>

</body>
</html>
